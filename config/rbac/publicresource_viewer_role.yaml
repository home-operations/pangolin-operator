---
# This rule is not used by the pangolin-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to PublicResource resources within pangolin.home-operations.com.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pangolin-operator
    app.kubernetes.io/managed-by: kustomize
  name: publicresource-viewer-role
rules:
  - apiGroups:
      - pangolin.home-operations.com
    resources:
      - publicresources
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - pangolin.home-operations.com
    resources:
      - publicresources/status
    verbs:
      - get
