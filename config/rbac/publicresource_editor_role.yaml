---
# This rule is not used by the pangolin-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete PublicResource resources within pangolin.home-operations.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pangolin-operator
    app.kubernetes.io/managed-by: kustomize
  name: publicresource-editor-role
rules:
  - apiGroups:
      - pangolin.home-operations.com
    resources:
      - publicresources
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - pangolin.home-operations.com
    resources:
      - publicresources/status
    verbs:
      - get
