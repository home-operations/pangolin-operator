---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: privateresources.pangolin.home-operations.com
spec:
  group: pangolin.home-operations.com
  names:
    kind: PrivateResource
    listKind: PrivateResourceList
    plural: privateresources
    shortNames:
    - privr
    singular: privateresource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.destination
      name: Destination
      type: string
    - jsonPath: .status.fullDomain
      name: Domain
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PrivateResource is the Schema for Pangolin private resources.
          Each instance registers a host or CIDR range reachable through the referenced NewtSite tunnel,
          making it accessible to Pangolin OLM VPN clients.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PrivateResourceSpec defines the desired state of a Pangolin
              private resource.
            properties:
              alias:
                description: |-
                  Alias is a fully-qualified domain name alias for the resource.
                  Required when mode is "host" and destination is a hostname (not an IP).
                type: string
              clientIds:
                description: ClientIds restricts access to these Pangolin client IDs.
                items:
                  type: integer
                type: array
              destination:
                description: |-
                  Destination is the IP, hostname, or CIDR to tunnel to. In http mode
                  this is the backend; pair with destinationPort.
                minLength: 1
                type: string
              destinationPort:
                description: DestinationPort is the backend port (required when mode=http).
                maximum: 65535
                minimum: 1
                type: integer
              disableIcmp:
                default: false
                description: DisableIcmp disables ICMP (ping) tunnelling for this
                  resource.
                type: boolean
              fullDomain:
                description: FullDomain is the Pangolin-managed domain to expose (required
                  when mode=http).
                type: string
              mode:
                description: |-
                  Mode is "host" (single IP/hostname), "cidr" (range), or "http"
                  (private HTTP resource reachable only via the Pangolin client).
                enum:
                - host
                - cidr
                - http
                type: string
              name:
                description: Name is the display name in Pangolin.
                maxLength: 255
                minLength: 1
                type: string
              roleIds:
                description: RoleIds restricts access to OLM clients that have one
                  of these Pangolin role IDs.
                items:
                  type: integer
                type: array
              scheme:
                default: http
                description: Scheme is the backend protocol when mode=http.
                enum:
                - http
                - https
                type: string
              siteRef:
                description: SiteRef is the name of the NewtSite that owns this resource.
                type: string
              ssl:
                description: Ssl enables a Pangolin TLS certificate on FullDomain
                  when mode=http (default true).
                type: boolean
              tcpPorts:
                default: '*'
                description: TcpPorts is the set of TCP ports to expose ("*" for all).
                  Ignored when mode=http.
                type: string
              udpPorts:
                default: '*'
                description: UdpPorts is the set of UDP ports to expose ("*" for all).
                  Ignored when mode=http.
                type: string
              userIds:
                description: UserIds restricts access to these Pangolin user IDs.
                items:
                  type: string
                type: array
            required:
            - destination
            - mode
            - name
            - siteRef
            type: object
          status:
            description: PrivateResourceStatus defines the observed state of a PrivateResource.
            properties:
              conditions:
                description: Conditions standard Kubernetes conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              fullDomain:
                description: FullDomain is the public domain assigned to this resource
                  (mode=http).
                type: string
              niceId:
                description: NiceID is the human-readable resource ID from Pangolin.
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the last observed spec generation.
                format: int64
                type: integer
              phase:
                description: Phase represents the current reconciliation phase.
                enum:
                - Pending
                - Creating
                - Ready
                - Deleting
                - Error
                type: string
              siteResourceId:
                description: SiteResourceID is the numeric resource ID returned by
                  the Pangolin API.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
