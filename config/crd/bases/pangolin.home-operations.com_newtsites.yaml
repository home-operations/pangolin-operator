---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: newtsites.pangolin.home-operations.com
spec:
  group: pangolin.home-operations.com
  names:
    kind: NewtSite
    listKind: NewtSiteList
    plural: newtsites
    shortNames:
    - nsite
    singular: newtsite
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.niceId
      name: Site ID
      type: string
    - jsonPath: .status.online
      name: Online
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NewtSite is the Schema for the newtsites API.
          It provisions a Pangolin site and manages the associated newt tunnel Deployment.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NewtSiteSpec defines the desired state of NewtSite
            properties:
              autoDiscover:
                description: |-
                  AutoDiscover enables operator-native HTTPRoute/Service discovery for this site.
                  When set, the operator watches HTTPRoutes and Services annotated with
                  <prefix>/site-ref: <newtsiteName> and creates PublicResource CRs owned by this NewtSite.
                properties:
                  allPorts:
                    description: AllPorts exposes all TCP/UDP ports of a Service as
                      individual PublicResources.
                    type: boolean
                  annotationPrefix:
                    default: pangolin-operator
                    description: |-
                      AnnotationPrefix is the annotation prefix used for discovery annotations.
                      Default: "pangolin-operator"
                    type: string
                  authSsoIdp:
                    description: AuthSSOIDP is the default Pangolin IdP ID for auto-login-idp
                      (0 = not set).
                    type: integer
                  authSsoRoles:
                    description: AuthSSORoles is the default comma-separated Pangolin
                      roles for SSO-enabled resources.
                    type: string
                  authSsoUsers:
                    description: AuthSSOUsers is the default comma-separated user
                      emails for SSO-enabled resources.
                    type: string
                  authWhitelistUsers:
                    description: AuthWhitelistUsers is the default comma-separated
                      user emails for whitelist-users.
                    type: string
                  denyCountries:
                    description: DenyCountries is a comma-separated list of country
                      codes to deny by default on all resources.
                    type: string
                  enableRouteDiscovery:
                    default: false
                    description: |-
                      EnableRouteDiscovery enables HTTPRoute discovery for this site.
                      When false (default), HTTPRoutes are not auto-discovered even if annotated.
                      Set to true to enable event-driven and periodic HTTPRoute scanning.
                    type: boolean
                  enableServiceDiscovery:
                    default: false
                    description: |-
                      EnableServiceDiscovery enables Service discovery for this site.
                      When false (default), Services are not auto-discovered even if annotated.
                      Set to true to enable event-driven and periodic Service scanning.
                    type: boolean
                  gatewayName:
                    description: |-
                      GatewayName filters HTTPRoutes by spec.parentRefs[].name.
                      When empty, all HTTPRoutes carrying the site-ref annotation are processed.
                    type: string
                  gatewayNamespace:
                    description: |-
                      GatewayNamespace additionally filters HTTPRoutes by parentRef namespace.
                      When empty, any namespace matches.
                    type: string
                  gatewayTargetHostname:
                    description: |-
                      GatewayTargetHostname is the cluster-internal hostname of the gateway service
                      that HTTPRoute traffic should be routed through (e.g. "envoy-external.network.svc.cluster.local").
                      Required when GatewayName is set.
                    type: string
                  gatewayTargetMethod:
                    default: https
                    description: |-
                      GatewayTargetMethod is the internal protocol used to reach the gateway service (http|https|h2c).
                      Defaults to "https".
                    enum:
                    - http
                    - https
                    - h2c
                    type: string
                  gatewayTargetPort:
                    default: 443
                    description: |-
                      GatewayTargetPort is the port on the gateway service to route traffic to.
                      Defaults to 443.
                    maximum: 65535
                    minimum: 1
                    type: integer
                  ssl:
                    default: true
                    description: SSL is the default SSL setting for HTTP resources
                      created from annotations.
                    type: boolean
                type: object
              name:
                description: Name is the site display name in Pangolin
                maxLength: 255
                minLength: 1
                type: string
              newt:
                description: Newt configures the newt tunnel container. Ignored when
                  type is "local".
                properties:
                  hostNetwork:
                    description: |-
                      HostNetwork grants the pod access to the host network namespace.
                      Only meaningful when UseNativeInterface is true.
                    type: boolean
                  hostPID:
                    description: |-
                      HostPID grants the pod access to the host PID namespace.
                      Only meaningful when UseNativeInterface is true.
                    type: boolean
                  image:
                    default: ghcr.io/fosrl/newt
                    description: Image is the newt container image
                    type: string
                  logLevel:
                    default: INFO
                    description: LogLevel for the newt container
                    enum:
                    - DEBUG
                    - INFO
                    - WARN
                    - ERROR
                    type: string
                  mtu:
                    description: Mtu is the MTU for the WireGuard tunnel
                    type: integer
                  replicas:
                    default: 1
                    description: Replicas for the Deployment
                    format: int32
                    maximum: 1
                    minimum: 0
                    type: integer
                  resources:
                    description: Resources for the newt container
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  tag:
                    default: latest
                    description: Tag overrides the image tag (defaults to "latest")
                    type: string
                  useNativeInterface:
                    description: |-
                      UseNativeInterface enables the WireGuard kernel interface instead of the
                      userspace implementation. When true the container runs as root with
                      NET_ADMIN and SYS_MODULE capabilities (privileged). Only use this when
                      the node kernel has the WireGuard module available.
                    type: boolean
                type: object
              type:
                default: newt
                description: |-
                  Type is the site connection type. Use "newt" (default) for a tunnelled site
                  managed by the newt Deployment, or "local" to expose resources running on the
                  same host as the Pangolin server without deploying a tunnel.
                enum:
                - newt
                - local
                type: string
            required:
            - name
            type: object
          status:
            description: NewtSiteStatus defines the observed state of NewtSite.
            properties:
              conditions:
                description: Conditions standard Kubernetes conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              newtSecretName:
                description: NewtSecretName is the auto-created Secret name containing
                  PANGOLIN_ENDPOINT/NEWT_ID/NEWT_SECRET
                type: string
              niceId:
                description: NiceID is the human-readable site ID from Pangolin
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the last observed spec generation
                format: int64
                type: integer
              online:
                description: Online tracks the tunnel connection status
                type: boolean
              phase:
                description: Phase represents the current reconciliation phase
                enum:
                - Pending
                - Creating
                - Ready
                - Deleting
                - Error
                type: string
              siteId:
                description: SiteID is the numeric site ID returned by Pangolin API
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
