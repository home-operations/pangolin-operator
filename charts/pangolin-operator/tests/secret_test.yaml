---
suite: secret
templates:
  - secret.tpl
tests:
  - it: should not create a secret with default values
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a secret when all pangolin values are set
    set:
      pangolin.endpoint: https://pangolin.example.com
      pangolin.apiUrl: https://api.pangolin.example.com
      pangolin.apiKey: my-api-key
      pangolin.orgId: my-org-id
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: should set the correct secret name
    release:
      name: my-release
    set:
      pangolin.endpoint: https://pangolin.example.com
      pangolin.apiUrl: https://api.pangolin.example.com
      pangolin.apiKey: my-api-key
      pangolin.orgId: my-org-id
    asserts:
      - equal:
          path: metadata.name
          value: my-release-pangolin-operator-credentials

  - it: should set namespace
    release:
      namespace: pangolin-system
    set:
      pangolin.endpoint: https://pangolin.example.com
      pangolin.apiUrl: https://api.pangolin.example.com
      pangolin.apiKey: my-api-key
      pangolin.orgId: my-org-id
    asserts:
      - equal:
          path: metadata.namespace
          value: pangolin-system

  - it: should set all credential fields
    set:
      pangolin.endpoint: https://pangolin.example.com
      pangolin.apiUrl: https://api.pangolin.example.com
      pangolin.apiKey: my-api-key
      pangolin.orgId: my-org-id
    asserts:
      - equal:
          path: stringData.PANGOLIN_ENDPOINT
          value: https://pangolin.example.com
      - equal:
          path: stringData.PANGOLIN_API_URL
          value: https://api.pangolin.example.com
      - equal:
          path: stringData.PANGOLIN_API_KEY
          value: my-api-key
      - equal:
          path: stringData.PANGOLIN_ORG_ID
          value: my-org-id

  - it: should not create a secret when existingSecret is set
    set:
      pangolin.existingSecret: my-external-secret
      pangolin.endpoint: https://pangolin.example.com
      pangolin.apiUrl: https://api.pangolin.example.com
      pangolin.apiKey: my-api-key
      pangolin.orgId: my-org-id
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a secret when only some values are set
    set:
      pangolin.endpoint: https://pangolin.example.com
      pangolin.apiUrl: https://api.pangolin.example.com
    asserts:
      - hasDocuments:
          count: 0
