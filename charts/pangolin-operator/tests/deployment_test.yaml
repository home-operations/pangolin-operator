---
suite: deployment
templates:
  - deployment.tpl
tests:
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: should set the correct name and namespace
    release:
      name: my-release
      namespace: pangolin-system
    asserts:
      - equal:
          path: metadata.name
          value: my-release-pangolin-operator
      - equal:
          path: metadata.namespace
          value: pangolin-system

  - it: should use fullnameOverride when set
    set:
      fullnameOverride: my-operator
    asserts:
      - equal:
          path: metadata.name
          value: my-operator

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: pangolin-operator
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should set replica count
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use the correct image
    set:
      image.repository: ghcr.io/example/operator
      image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/example/operator:v1.2.3

  - it: should default image tag to appVersion
    chart:
      appVersion: 0.5.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/pangolin-operator:0.5.0

  - it: should set imagePullPolicy
    set:
      image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should set imagePullSecrets when provided
    set:
      imagePullSecrets:
        - name: my-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-secret

  - it: should set the correct service account name
    release:
      name: my-release
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-release-pangolin-operator

  - it: should set priorityClassName
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-node-critical

  - it: should omit priorityClassName when empty
    set:
      priorityClassName: ""
    asserts:
      - notExists:
          path: spec.template.spec.priorityClassName

  - it: should set pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532

  - it: should set container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should set resource limits and requests
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 10m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi

  - it: should include leader-elect arg by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect

  - it: should omit leader-elect arg when disabled
    set:
      controller.leaderElection.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect

  - it: should include metrics args by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8080
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-secure=false

  - it: should omit metrics args when disabled
    set:
      controller.metrics.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8080

  - it: should include pprof args when enabled
    set:
      controller.pprof.enabled: true
      controller.pprof.port: 6060
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-pprof
      - contains:
          path: spec.template.spec.containers[0].args
          content: --pprof-bind-address=:6060

  - it: should omit pprof args by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --enable-pprof

  - it: should expose health port
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: health
            containerPort: 8081
            protocol: TCP

  - it: should expose metrics port when enabled
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8080
            protocol: TCP

  - it: should not expose metrics port when disabled
    set:
      controller.metrics.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8080
            protocol: TCP

  - it: should expose pprof port when enabled
    set:
      controller.pprof.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: pprof
            containerPort: 6060
            protocol: TCP

  - it: should set liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: should reference the credentials secret
    release:
      name: my-release
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-release-pangolin-operator-credentials

  - it: should reference an existing secret when set
    set:
      pangolin.existingSecret: my-external-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-external-secret

  - it: should set tolerations
    asserts:
      - exists:
          path: spec.template.spec.tolerations

  - it: should set custom node selector
    set:
      nodeSelector:
        kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/os"]
          value: linux

  - it: should set pod annotations
    set:
      podAnnotations:
        custom/annotation: value
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom/annotation"]
          value: value

  - it: should set pod labels
    set:
      podLabels:
        custom/label: value
    asserts:
      - equal:
          path: spec.template.metadata.labels["custom/label"]
          value: value

  - it: should set enableServiceLinks to false
    asserts:
      - equal:
          path: spec.template.spec.enableServiceLinks
          value: false

  - it: should set the default-container annotation
    asserts:
      - equal:
          path: spec.template.metadata.annotations["kubectl.kubernetes.io/default-container"]
          value: manager

  - it: should set volume mounts when provided
    set:
      volumeMounts:
        - name: config
          mountPath: /etc/config
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: config

  - it: should set volumes when provided
    set:
      volumes:
        - name: config
          configMap:
            name: my-config
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: config
