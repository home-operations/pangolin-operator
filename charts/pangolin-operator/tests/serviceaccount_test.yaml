---
suite: service account
templates:
  - serviceaccount.tpl
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - hasDocuments:
          count: 1

  - it: should not create a ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set the correct name
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-pangolin-operator

  - it: should use custom name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set namespace
    release:
      namespace: pangolin-system
    asserts:
      - equal:
          path: metadata.namespace
          value: pangolin-system

  - it: should include common labels
    release:
      name: my-release
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: pangolin-operator

  - it: should set annotations when provided
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::role/my-role

  - it: should not have annotations when none provided
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should enable automount by default
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  # NOTE: setting automount to false currently has no effect because the template
  # uses `| default true` which treats false as empty. This is a known Helm
  # gotcha. The operator requires automount anyway (see values.yaml comment).
  - it: should keep automount true even when set to false (default template bug)
    set:
      serviceAccount.automount: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
