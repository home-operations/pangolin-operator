---
when:
  - event: push
    branch: main
  - event: pull_request
    branch: main

steps:
  - name: lint
    image: golangci/golangci-lint:v2.9.0
    commands:
      - golangci-lint run ./...

  - name: helm-lint
    image: alpine/helm:4.1.3
    commands:
      - helm lint charts/pangolin-operator
